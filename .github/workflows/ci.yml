name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      # TODO: add `cargo clippy --all-targets --all-features -- -D warnings`
      # after it is green locally; it is currently red on this checkout.
      - name: Test
        run: cargo test --all-targets --all-features
